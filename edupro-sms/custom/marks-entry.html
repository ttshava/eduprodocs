<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Marks Entry | Edupro SMS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }

  /* ── Top bar ── */
  .topbar {
    background: #c0392b; color: #fff;
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-brand { font-size: 15px; font-weight: 700; letter-spacing: .5px; }
  .topbar-user  { font-size: 13px; opacity: .9; }

  /* ── Page ── */
  .page { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; color: #c0392b; }

  /* ── Toolbar ── */
  .toolbar {
    background: #fff; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    padding: 16px 20px; margin-bottom: 20px;
    display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end;
  }
  .tb-group { display: flex; flex-direction: column; gap: 5px; }
  .tb-group label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: #888;
  }
  select, input[type=text] {
    padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; outline: none; background: #fff; min-width: 160px;
  }
  select:focus, input:focus { border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,.08); }

  .btn-load {
    padding: 9px 22px; background: #c0392b; color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; white-space: nowrap; align-self: flex-end;
  }
  .btn-load:hover { background: #a93226; }

  /* ── Sheet card ── */
  .sheet-card {
    background: #fff; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); overflow: hidden;
  }
  .sheet-header {
    padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .sheet-title { font-size: 16px; font-weight: 700; }
  .sheet-meta  { font-size: 13px; color: #777; }

  .sheet-actions { display: flex; gap: 10px; }
  .btn-save {
    padding: 9px 24px; background: #c0392b; color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  .btn-save:hover   { background: #a93226; }
  .btn-save:disabled{ background: #e0e0e0; color: #aaa; cursor: not-allowed; }
  .btn-clear {
    padding: 9px 16px; background: none; color: #888;
    border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
    cursor: pointer;
  }
  .btn-clear:hover { background: #f8f8f8; }

  /* ── Marks table ── */
  .table-wrap { overflow-x: auto; }
  table.marks {
    width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px;
  }
  table.marks th {
    background: #f8f9fa; padding: 10px 8px; text-align: center;
    font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: #666;
    border-bottom: 2px solid #eee; white-space: nowrap;
    position: sticky; top: 0;
  }
  table.marks th.name-col { text-align: left; min-width: 180px; }
  table.marks td { padding: 7px 6px; border-bottom: 1px solid #f5f5f5; text-align: center; }
  table.marks td.name-cell { text-align: left; padding-left: 16px; font-weight: 600; }
  table.marks td.id-cell   { font-size: 11px; color: #aaa; }
  table.marks tr:hover td  { background: #fef5f5; }

  .score-input {
    width: 56px; padding: 5px 6px; border: 1px solid #e0e0e0; border-radius: 6px;
    font-size: 13px; text-align: center; outline: none; background: #fff;
    transition: border-color .1s;
  }
  .score-input:focus { border-color: #c0392b; box-shadow: 0 0 0 2px rgba(192,57,43,.1); }
  .score-input.changed { background: #fffbeb; border-color: #f59e0b; }

  .grade-badge {
    display: inline-block; width: 28px; height: 22px; line-height: 22px;
    border-radius: 5px; font-size: 12px; font-weight: 700; text-align: center;
    background: #f0f0f0; color: #555;
  }
  .grade-A, .grade-1 { background: #dcfce7; color: #15803d; }
  .grade-B, .grade-2 { background: #dbeafe; color: #1d4ed8; }
  .grade-C, .grade-3 { background: #ede9fe; color: #7c3aed; }
  .grade-D, .grade-4 { background: #fef9c3; color: #854d0e; }
  .grade-E, .grade-5 { background: #ffedd5; color: #c2410c; }
  .grade-U, .grade-6, .grade-7 { background: #fee2e2; color: #b91c1c; }

  .avg-cell { font-weight: 700; color: #c0392b; }

  /* ── Status bar ── */
  .status-bar {
    padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee;
    font-size: 12px; color: #888; display: flex; justify-content: space-between;
  }
  .status-bar .saved-ok { color: #16a34a; font-weight: 600; }
  .status-bar .save-err { color: #c0392b; font-weight: 600; }

  /* ── Empty / loading states ── */
  .notice { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }
  .spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid #eee; border-top-color: #c0392b;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Key ── */
  .grade-key {
    padding: 14px 20px; border-top: 1px solid #f0f0f0;
    font-size: 12px; color: #666; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .grade-key strong { font-size: 11px; text-transform: uppercase; color: #aaa; margin-right: 4px; }
  .gk-item { display: flex; align-items: center; gap: 5px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Edupro SMS &nbsp;/&nbsp; Teacher Marks Entry</span>
  <span class="topbar-user" id="top-user"></span>
</div>

<div class="page">
  <h1>Enter Student Marks</h1>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="tb-group">
      <label>Class</label>
      <select id="class-select">
        <option value="">— Select class —</option>
      </select>
    </div>
    <div class="tb-group">
      <label>Term</label>
      <select id="term-select">
        <option value="">— Select term —</option>
      </select>
    </div>
    <button class="btn-load" onclick="loadSheet()">Load Marks Sheet</button>
  </div>

  <!-- Marks sheet -->
  <div class="sheet-card">
    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="sheet-title">No class selected</div>
        <div class="sheet-meta"  id="sheet-meta"></div>
      </div>
      <div class="sheet-actions">
        <button class="btn-clear" onclick="clearChanges()" id="clear-btn" style="display:none">Discard Changes</button>
        <button class="btn-save"  onclick="saveMarks()"   id="save-btn"  disabled>Save All Marks</button>
      </div>
    </div>

    <div id="sheet-body">
      <div class="notice">Select a class and term, then click <strong>Load Marks Sheet</strong>.</div>
    </div>

    <div class="status-bar">
      <span id="status-msg">Ready</span>
      <span id="change-count"></span>
    </div>
  </div>
</div>

<script>
const BASE  = "/api/method/education.api.marks_entry";
let csrf    = "";
let sheetData = null;   // full sheet from API
let changes   = {};     // { "studentId|subject": newScore }

const GRADE_SCALE  = [[80,"A"],[70,"B"],[60,"C"],[50,"D"],[40,"E"],[0,"U"]];
const GRADE7_SCALE = [[75,"1"],[65,"2"],[55,"3"],[45,"4"],[35,"5"],[25,"6"],[0,"7"]];

function getGrade(score, is_g7) {
  const scale = is_g7 ? GRADE7_SCALE : GRADE_SCALE;
  for (const [mn, g] of scale) { if (score >= mn) return g; }
  return scale[scale.length - 1][1];
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch("/api/method/education.api.parent_portal.get_csrf_token");
    csrf = (await r.json()).message || "";
  } catch(e) {}

  try {
    const r = await fetch("/api/method/frappe.auth.get_logged_user");
    document.getElementById("top-user").textContent = (await r.json()).message || "";
  } catch(e) {}

  await loadSelectors();
}

// ── Selectors ──────────────────────────────────────────────────
async function loadSelectors() {
  try {
    const [classes, terms] = await Promise.all([
      apiGet(`${BASE}.get_my_classes`, {}),
      apiGet(`${BASE}.get_terms`, {})
    ]);

    const cs = document.getElementById("class-select");
    (classes || []).forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.label;
      cs.appendChild(opt);
    });

    const ts = document.getElementById("term-select");
    (terms || []).forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      ts.appendChild(opt);
    });
    if (ts.options.length > 1) ts.selectedIndex = 1;
  } catch(e) {
    console.error("Error loading selectors:", e);
  }
}

// ── Load sheet ─────────────────────────────────────────────────
async function loadSheet() {
  const group = document.getElementById("class-select").value;
  const term  = document.getElementById("term-select").value;
  if (!group) { alert("Please select a class."); return; }
  if (!term)  { alert("Please select a term."); return; }

  const body = document.getElementById("sheet-body");
  body.innerHTML = `<div class="notice"><span class="spinner"></span>Loading marks sheet…</div>`;
  document.getElementById("save-btn").disabled = true;
  changes = {};
  updateChangeCount();

  try {
    const data = await apiGet(`${BASE}.get_marks_sheet`, { group, term });
    if (!data) return;
    sheetData = data;
    renderSheet(data);
    document.getElementById("sheet-title").textContent = data.label;
    document.getElementById("sheet-meta").textContent  =
      `${data.program}  ·  ${data.year}  ·  ${data.term}  ·  ${data.students.length} students`;
    setStatus("Sheet loaded. Enter scores and click Save.");
  } catch(e) {
    body.innerHTML = `<div class="notice" style="color:#c0392b">Error: ${e.message}</div>`;
  }
}

// ── Render table ───────────────────────────────────────────────
function renderSheet(d) {
  const subjects = d.subjects;
  const is_g7    = d.is_g7;

  let html = `<div class="table-wrap"><table class="marks">
  <thead><tr>
    <th class="name-col">Student</th>
    <th>ID</th>`;
  subjects.forEach(s => {
    html += `<th title="${s}">${abbr(s)}<br><span style="font-size:10px;font-weight:400">Score / Grade</span></th>`;
  });
  html += `<th>Average</th></tr></thead><tbody>`;

  d.students.forEach(stu => {
    html += `<tr>
      <td class="name-cell">${stu.name}</td>
      <td class="id-cell">${stu.id}</td>`;

    let total = 0, count = 0;
    subjects.forEach(sub => {
      const existing = stu.scores[sub] || {};
      const score = existing.score !== undefined ? existing.score : "";
      const grade = score !== "" ? getGrade(parseInt(score), is_g7) : "";
      const key   = `${stu.id}|${sub}`;

      html += `<td>
        <input type="number" class="score-input" min="0" max="100"
               data-key="${key}" data-student="${stu.id}" data-subject="${sub}"
               value="${score}" placeholder="—"
               oninput="onScoreChange(this)">
        <span class="grade-badge grade-${grade}" id="gb-${key}">${grade}</span>
      </td>`;
      if (score !== "") { total += parseInt(score); count++; }
    });

    const avg = count > 0 ? (total / count).toFixed(1) : "—";
    html += `<td class="avg-cell" id="avg-${stu.id}">${avg}</td></tr>`;
  });

  html += `</tbody></table></div>`;

  // Grade key
  const keyItems = is_g7
    ? [["1","Distinction"],["2","Merit"],["3","Credit"],["4","Pass"],["5","Pass"],["6","Needs Improvement"],["7","Below Expectations"]]
    : [["A","Excellent"],["B","Very Good"],["C","Good"],["D","Satisfactory"],["E","Needs Improvement"],["U","Unsatisfactory"]];
  html += `<div class="grade-key"><strong>Key:</strong>`;
  keyItems.forEach(([g, lbl]) => {
    html += `<span class="gk-item"><span class="grade-badge grade-${g}">${g}</span> ${lbl}</span>`;
  });
  html += `</div>`;

  document.getElementById("sheet-body").innerHTML = html;
  document.getElementById("save-btn").disabled = false;
  document.getElementById("clear-btn").style.display = "inline-block";
}

// ── Score change ───────────────────────────────────────────────
function onScoreChange(input) {
  const key     = input.dataset.key;
  const student = input.dataset.student;
  const subject = input.dataset.subject;
  let   val     = input.value.trim();

  if (val === "" || isNaN(val)) {
    delete changes[key];
    input.classList.remove("changed");
  } else {
    val = Math.max(0, Math.min(100, parseInt(val)));
    input.value = val;
    changes[key] = { student_id: student, subject: subject, score: val };
    input.classList.add("changed");

    // Update grade badge
    const grade = getGrade(val, sheetData.is_g7);
    const badge = document.getElementById("gb-" + key);
    if (badge) {
      badge.textContent  = grade;
      badge.className    = "grade-badge grade-" + grade;
    }

    // Recalc row average
    recalcAvg(student);
  }
  updateChangeCount();
}

function recalcAvg(studentId) {
  let total = 0, count = 0;
  document.querySelectorAll(`input[data-student="${studentId}"]`).forEach(inp => {
    if (inp.value !== "") { total += parseInt(inp.value); count++; }
  });
  const el = document.getElementById("avg-" + studentId);
  if (el) el.textContent = count > 0 ? (total / count).toFixed(1) : "—";
}

function updateChangeCount() {
  const n = Object.keys(changes).length;
  document.getElementById("change-count").textContent = n > 0 ? `${n} unsaved change${n===1?"":"s"}` : "";
}

// ── Save ───────────────────────────────────────────────────────
async function saveMarks() {
  if (!sheetData) return;
  const group = document.getElementById("class-select").value;
  const year  = sheetData.year;
  const term  = sheetData.term;

  // Collect ALL filled scores (not just changed ones)
  const allMarks = [];
  document.querySelectorAll(".score-input").forEach(inp => {
    if (inp.value !== "") {
      allMarks.push({
        student_id: inp.dataset.student,
        subject:    inp.dataset.subject,
        score:      parseInt(inp.value)
      });
    }
  });

  if (!allMarks.length) { alert("No scores to save."); return; }

  document.getElementById("save-btn").disabled = true;
  document.getElementById("save-btn").textContent = "Saving…";
  setStatus("Saving marks…");

  try {
    const result = await apiPost(`${BASE}.save_marks`, {
      group,
      year,
      term,
      marks_json: JSON.stringify(allMarks)
    });
    // Clear changed indicators
    document.querySelectorAll(".score-input.changed").forEach(i => i.classList.remove("changed"));
    changes = {};
    updateChangeCount();
    setStatus(`✓ ${result.message}`, "ok");
  } catch(e) {
    setStatus("Error: " + e.message, "err");
  } finally {
    document.getElementById("save-btn").disabled = false;
    document.getElementById("save-btn").textContent = "Save All Marks";
  }
}

function clearChanges() {
  if (!confirm("Discard all unsaved changes and reload?")) return;
  loadSheet();
}

function setStatus(msg, type) {
  const el = document.getElementById("status-msg");
  el.textContent = msg;
  el.className = type === "ok" ? "saved-ok" : type === "err" ? "save-err" : "";
}

// ── Abbreviate long subject names ──────────────────────────────
function abbr(s) {
  const map = {
    "English Language":                         "English",
    "Mathematics":                              "Maths",
    "Shona Language":                           "Shona",
    "Heritage Studies":                         "Heritage",
    "Science and Technology":                   "Science",
    "Family Arts and Technology":               "Family Arts",
    "Religious and Moral Education":            "RME",
    "Physical Education, Sport and Mass Display": "PE"
  };
  return map[s] || s;
}

// ── API helpers ────────────────────────────────────────────────
async function apiGet(method, params) {
  const qs = new URLSearchParams(params).toString();
  const r  = await fetch(`/api/method/${method}?${qs}`, {
    headers: { "X-Frappe-CSRF-Token": csrf }
  });
  if (r.status === 401 || r.status === 403) { location.href = "/login"; return null; }
  const j = await r.json();
  if (j.exc_type) throw new Error(j.exception || j.exc_type);
  return j.message;
}

async function apiPost(method, data) {
  const r = await fetch(`/api/method/${method}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded",
      "X-Frappe-CSRF-Token": csrf
    },
    body: new URLSearchParams(data).toString()
  });
  if (r.status === 401 || r.status === 403) { location.href = "/login"; return null; }
  const j = await r.json();
  if (j.exc_type) throw new Error(j.exception || j.exc_type);
  return j.message;
}

init();
</script>
</body>
</html>
