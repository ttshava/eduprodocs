<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EduPro — Student Tablet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

/* VIDEO — fills entire screen */
#screen{
  width:100vw;height:100vh;
  object-fit:contain;
  background:#000;
  display:none;
}

/* OVERLAY — shown when not receiving */
#overlay{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#0f172a;color:#f1f5f9;
  gap:16px;padding:24px;text-align:center;
  transition:opacity .5s;
}
#overlay.hidden{opacity:0;pointer-events:none}
.ov-logo{font-size:56px}
.ov-title{font-size:1.2rem;font-weight:700}
.ov-status{font-size:.9rem;color:#94a3b8;max-width:280px;line-height:1.5}
.spinner{width:32px;height:32px;border:3px solid #334155;border-top-color:#FF0527;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Status bar (top) — shows when live */
#statusbar{
  position:fixed;top:0;left:0;right:0;
  height:40px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:space-between;
  padding:0 16px;font-size:.8rem;color:rgba(255,255,255,.7);
  z-index:10;
}
#statusbar.show{display:flex}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 6px #22c55e;animation:glow 2s ease-in-out infinite;margin-right:6px;display:inline-block}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}

/* Fullscreen prompt */
#fs-btn{
  position:fixed;bottom:20px;right:20px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);border-radius:8px;
  color:white;padding:8px 14px;font-size:.75rem;cursor:pointer;
  z-index:20;display:none;
}
</style>
</head>
<body>

<video id="screen" autoplay playsinline></video>

<div id="overlay">
  <div class="ov-logo">📱</div>
  <div class="ov-title">EduPro Student Tablet</div>
  <div class="spinner" id="spinner"></div>
  <div class="ov-status" id="ov-status">Connecting to classroom server…</div>
</div>

<div id="statusbar">
  <div><span class="live-dot"></span> LIVE</div>
  <div id="sb-viewers">0 watching</div>
  <div style="opacity:.5">EduPro Classroom</div>
</div>

<button id="fs-btn" onclick="goFullscreen()">⛶ Fullscreen</button>

<script src="/socket.io/socket.io.js"></script>
<script src="/tablet-client.js"></script>
<script>
const SERVER = location.origin;
const socket = io(SERVER);

let device, consumerTransport, consumer;
let connected = false;

const videoEl    = document.getElementById('screen');
const overlay    = document.getElementById('overlay');
const ovStatus   = document.getElementById('ov-status');
const spinner    = document.getElementById('spinner');
const statusbar  = document.getElementById('statusbar');
const sbViewers  = document.getElementById('sb-viewers');
const fsBtn      = document.getElementById('fs-btn');

function setStatus(msg, showSpinner = true) {
  ovStatus.textContent = msg;
  spinner.style.display = showSpinner ? 'block' : 'none';
}

// ── Socket events ────────────────────────────────────────────────────────────
socket.on('connect', async () => {
  setStatus('Connected — waiting for board to start…');
  await initTransport();
});

socket.on('disconnect', () => {
  showOverlay('Lost connection to server — reconnecting…');
});

socket.on('board:newProducer', async () => {
  setStatus('Board started — loading stream…');
  await startConsuming();
});

socket.on('board:stopped', () => {
  showOverlay('Board has stopped broadcasting.', false);
  if (videoEl.srcObject) { videoEl.srcObject.getTracks().forEach(t => t.stop()); videoEl.srcObject = null; }
  videoEl.style.display = 'none';
  statusbar.classList.remove('show');
  fsBtn.style.display = 'none';
});

socket.on('server:status', (s) => {
  sbViewers.textContent = s.viewers + ' watching';
});

// ── Init transport ───────────────────────────────────────────────────────────
async function initTransport() {
  try {
    const params = await createConsumerTransport();

    device = new mediasoupClient.Device();
    await device.load({ routerRtpCapabilities: params.rtpCapabilities });

    consumerTransport = device.createRecvTransport(params);

    consumerTransport.on('connect', ({ dtlsParameters }, cb, errCb) => {
      socket.emit('tablet:connectTransport', { dtlsParameters }, (res) => {
        res.ok ? cb() : errCb(new Error(res.error));
      });
    });

    // If board is already broadcasting, start consuming immediately
    if (params.producerExists) {
      await startConsuming();
    } else {
      setStatus('Waiting for teacher to start the board broadcast…', false);
    }

  } catch (err) {
    console.error('initTransport error:', err);
    setStatus('⚠ Setup error: ' + err.message);
  }
}

// ── Start consuming ──────────────────────────────────────────────────────────
async function startConsuming() {
  try {
    setStatus('Loading board stream…');

    const params = await consume();
    consumer = consumerTransport.consume(params);

    const stream = new MediaStream([consumer.track]);
    videoEl.srcObject = stream;

    videoEl.oncanplay = () => {
      videoEl.style.display = 'block';
      overlay.classList.add('hidden');
      statusbar.classList.add('show');
      fsBtn.style.display = 'block';
      videoEl.play().catch(() => {});
    };

  } catch (err) {
    console.error('startConsuming error:', err);
    setStatus('Could not receive board stream: ' + err.message);
  }
}

function showOverlay(msg, spin = true) {
  overlay.classList.remove('hidden');
  setStatus(msg, spin);
}

// ── Signaling helpers ────────────────────────────────────────────────────────
function createConsumerTransport() {
  return new Promise((res, rej) => {
    socket.emit('tablet:createTransport', {}, (data) => {
      if (data.ok) res(data);
      else rej(new Error(data.error));
    });
  });
}

function consume() {
  return new Promise((res, rej) => {
    socket.emit('tablet:consume', { rtpCapabilities: device.rtpCapabilities }, (data) => {
      if (data.ok) res(data);
      else rej(new Error(data.error));
    });
  });
}

// ── Fullscreen ───────────────────────────────────────────────────────────────
function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

// Auto fullscreen on first tap (required by mobile browsers)
document.addEventListener('click', () => { if (!document.fullscreenElement) goFullscreen(); }, { once: true });
</script>
</body>
</html>
